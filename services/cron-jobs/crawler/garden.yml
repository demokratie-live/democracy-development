kind: Build
name: import-procedures
description: Import procedures for the bundestag.io API
type: container
source:
  path: ../../../
include:
  - ./**/*
  - ./infra/Dockerfile
spec:
  dockerfile: ./infra/Dockerfile
  buildArgs:
    NODE_VERSION: 20.9.0
    SERVICE: crawler
    SERVICE_PATH: services/cron-jobs/crawler
  extraFlags: ['--load']

---
kind: Deploy
name: crawler-runtime-config
description: Shared crawler runtime ConfigMap and Secret for local and scheduled runs
type: kubernetes

varfiles:
  - path: .env
    optional: true
  - path: .env.local
    optional: true

source:
  path: manifests

spec:
  manifestTemplates:
    - ConfigMap.yaml
    - Secret.yaml

---
kind: Run
name: import-procedures
description: Ad-hoc import-Job for Prozeduren
dependencies:
  - build.import-procedures
  - deploy.mongo
  - deploy.crawler-runtime-config
timeout: 1800

type: kubernetes-pod
spec:
  podSpec:
    restartPolicy: Never
    containers:
      - name: import-procedures
        image: ${actions.build.import-procedures.outputs.deploymentImageId}
        imagePullPolicy: IfNotPresent
        envFrom:
          - configMapRef:
              name: crawler-config
          - secretRef:
              name: dip-api-token
              optional: false
